<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400">
  <title>航海志 Navigator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header class="header">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 5.63l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83a.996.996 0 0 0 0-1.41z" fill="none"/>
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="url(#logo-gradient)"/>
          <defs>
            <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#6366f1"/>
              <stop offset="100%" style="stop-color:#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="header-text">
          <h1 class="header-title">航海志</h1>
          <span class="header-subtitle">Navigator</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-history" class="icon-btn" title="下载记录" aria-label="下载记录">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 状态区域 -->
    <div id="status-area" class="status-area">
      <div class="status-spinner"></div>
      <p class="status-text">正在分析页面...</p>
    </div>

    <!-- 预览区域 -->
    <div id="preview-area" class="preview-area hidden">
      <div class="preview-card">
        <!-- 封面预览 -->
        <div id="cover-preview" class="cover-preview hidden">
          <img id="cover-img" alt="封面" />
        </div>

        <!-- 元数据编辑 -->
        <div class="meta-group">
          <label class="meta-label" for="input-title">
            <svg viewBox="0 0 16 16" width="14" height="14"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3zM2.5 2a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3zm6.5.5A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3zm1.5-.5a.5.5 0 0 0-.5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 0-.5-.5h-3z" fill="currentColor"/></svg>
            标题
          </label>
          <input type="text" id="input-title" class="meta-input" maxlength="100" placeholder="文章标题">
        </div>

        <div class="meta-row">
          <div class="meta-group half">
            <label class="meta-label" for="input-author">
              <svg viewBox="0 0 16 16" width="14" height="14"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z" fill="currentColor"/></svg>
              作者
            </label>
            <input type="text" id="input-author" class="meta-input" placeholder="作者">
          </div>
          <div class="meta-group half">
            <label class="meta-label" for="input-date">
              <svg viewBox="0 0 16 16" width="14" height="14"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z" fill="currentColor"/></svg>
              日期
            </label>
            <input type="date" id="input-date" class="meta-input">
          </div>
        </div>


        <!-- 统计信息 -->
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-icon">📝</span>
            <span id="stat-words" class="stat-value">0</span>
            <span class="stat-label">字</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-icon">🖼️</span>
            <span id="stat-images" class="stat-value">0</span>
            <span class="stat-label">张图片</span>
          </div>
        </div>
      </div>

      <!-- 转换按钮 -->
      <button id="btn-convert" class="btn-convert">
        <svg class="btn-icon" viewBox="0 0 24 24" width="20" height="20">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/>
        </svg>
        <span>转换为 EPUB</span>
      </button>
    </div>

    <!-- 进度区域 -->
    <div id="progress-area" class="progress-area hidden">
      <div class="progress-header">
        <h2 class="progress-title">正在转换...</h2>
        <span id="progress-percent" class="progress-percent">0%</span>
      </div>
      <div class="progress-bar-track">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <div class="progress-steps">
        <div id="step-extract" class="progress-step active">
          <div class="step-indicator">
            <div class="step-dot"></div>
          </div>
          <span class="step-label">提取内容</span>
        </div>
        <div class="step-connector"></div>
        <div id="step-images" class="progress-step">
          <div class="step-indicator">
            <div class="step-dot"></div>
          </div>
          <span class="step-label">下载图片</span>
        </div>
        <div class="step-connector"></div>
        <div id="step-epub" class="progress-step">
          <div class="step-indicator">
            <div class="step-dot"></div>
          </div>
          <span class="step-label">生成 EPUB</span>
        </div>
      </div>
    </div>

    <!-- 成功区域 -->
    <div id="success-area" class="success-area hidden">
      <div class="success-icon-wrapper">
        <svg class="success-icon" viewBox="0 0 24 24" width="56" height="56">
          <circle cx="12" cy="12" r="11" fill="none" stroke="url(#success-gradient)" stroke-width="2"/>
          <path d="M7 12.5l3 3 7-7" fill="none" stroke="url(#success-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="success-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#10b981"/>
              <stop offset="100%" style="stop-color:#34d399"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="success-title">转换成功！</h2>
      <p class="success-desc">EPUB 文件已保存到下载文件夹</p>
      <p id="success-filename" class="success-filename"></p>
      <button id="btn-open-folder" class="btn-secondary">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" fill="currentColor"/>
        </svg>
        打开文件夹
      </button>
    </div>

    <!-- 错误区域 -->
    <div id="error-area" class="error-area hidden">
      <div class="error-icon-wrapper">
        <svg class="error-icon" viewBox="0 0 24 24" width="48" height="48">
          <circle cx="12" cy="12" r="11" fill="none" stroke="#ef4444" stroke-width="2"/>
          <line x1="8" y1="8" x2="16" y2="16" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="16" y1="8" x2="8" y2="16" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="error-title">转换失败</h2>
      <p id="error-message" class="error-message">发生未知错误</p>
      <button id="btn-retry" class="btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
        </svg>
        重试
      </button>
    </div>

    <!-- 历史记录区域 -->
    <div id="history-area" class="history-area hidden">
      <div class="history-header">
        <h2 class="history-title">最近转换</h2>
        <button id="btn-history-close" class="icon-btn" style="color:var(--text-primary);background:none">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="history-list" class="history-list"></div>
      <div id="history-empty" class="history-empty hidden">暂无保存记录</div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
